<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathematik Lernsystem — Abitur 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,300&display=swap" rel="stylesheet">
<style>
  /* ── RESET & BASE ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0c0c10;
    --bg2:         #13131a;
    --bg3:         #1a1a24;
    --bg4:         #22222f;
    --line:        #2a2a3d;
    --line2:       #353550;

    --text:        #e8e8f0;
    --text2:       #9090b8;
    --text3:       #5a5a80;

    --blue:        #4f8ef7;
    --blue-d:      #1a4a9e;
    --blue-bg:     #0d1f3c;

    --sky:         #38bdf8;
    --sky-d:       #0369a1;
    --sky-bg:      #071e2e;

    --purple:      #a78bfa;
    --purple-d:    #5b21b6;
    --purple-bg:   #160d2e;

    --green:       #4ade80;
    --green-d:     #166534;
    --green-bg:    #0a1f14;

    --gold:        #fbbf24;
    --gold-bg:     #1c1608;

    --red:         #f87171;

    --radius:      10px;
    --radius-lg:   16px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── SCROLLBAR ────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 3px; }

  /* ── LAYOUT ───────────────────────────────────────────────────────────── */
  .app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ──────────────────────────────────────────────────────────── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--line);
  }

  .sidebar-logo {
    font-family: 'Fraunces', serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .sidebar-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }

  .sidebar-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  /* overall progress */
  .sidebar-progress {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }

  .prog-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .prog-bar-wrap {
    background: var(--bg4);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .prog-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--purple), var(--blue));
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* subject nav */
  .sidebar-nav { padding: 12px 0; flex: 1; }

  .nav-subject {
    padding: 0 12px;
    margin-bottom: 4px;
  }

  .nav-subject-btn {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 12px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    transition: background 0.15s;
    color: var(--text2);
  }

  .nav-subject-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-subject-btn.active { background: var(--bg4); color: var(--text); }

  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-subject-name {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .nav-pct {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .nav-mini-bar {
    width: 100%;
    height: 2px;
    background: var(--bg4);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }

  .nav-mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s;
  }

  /* section links inside nav */
  .nav-sections {
    display: none;
    padding: 4px 0 4px 30px;
  }

  .nav-subject.active .nav-sections { display: block; }

  .nav-sec-link {
    display: block;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-sec-link:hover { color: var(--text); background: var(--bg3); }

  /* reset btn */
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--line);
  }

  .reset-btn {
    width: 100%;
    background: none;
    border: 1px solid var(--line2);
    color: var(--text3);
    padding: 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── MAIN ─────────────────────────────────────────────────────────────── */
  .main {
    flex: 1;
    padding: 40px 48px;
    max-width: 900px;
  }

  /* ── SUBJECT BLOCK ────────────────────────────────────────────────────── */
  .subject-block { margin-bottom: 80px; }

  .subject-hero {
    padding: 32px 36px;
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .subject-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .subject-num {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
  }

  .subject-name {
    font-family: 'Fraunces', serif;
    font-size: 34px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .subject-subtitle {
    font-size: 13px;
    opacity: 0.75;
    margin-bottom: 20px;
  }

  .subject-refs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .ref-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .subject-stats {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .subject-prog-bar {
    flex: 1;
    height: 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    overflow: hidden;
  }

  .subject-prog-fill {
    height: 100%;
    border-radius: 4px;
    background: rgba(255,255,255,0.5);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .subject-pct {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    min-width: 52px;
    text-align: right;
  }

  .subject-count {
    font-size: 11px;
    opacity: 0.65;
    min-width: 60px;
  }

  /* ── SECTION ──────────────────────────────────────────────────────────── */
  .section-block {
    margin-bottom: 20px;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: var(--bg2);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .section-header:hover { background: var(--bg3); }

  .section-toggle {
    font-size: 10px;
    color: var(--text3);
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .section-toggle.open { transform: rotate(90deg); }

  .section-accent-bar {
    width: 3px;
    height: 22px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .section-title-wrap { flex: 1 }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .section-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .section-prog {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .sec-mini-bar {
    width: 60px;
    height: 4px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }

  .sec-mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s;
  }

  .sec-count {
    font-size: 11px;
    color: var(--text3);
    min-width: 36px;
    text-align: right;
  }

  /* section body */
  .section-body {
    display: none;
    border-top: 1px solid var(--line);
  }

  .section-body.open { display: block; }

  /* ── CHECK ITEM ───────────────────────────────────────────────────────── */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }

  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: var(--bg3); }
  .check-item.done { background: rgba(74,222,128,0.03); }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid var(--line2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    background: transparent;
  }

  .check-item.done .check-box {
    border-color: var(--green);
    background: var(--green);
  }

  .check-tick {
    opacity: 0;
    transform: scale(0) rotate(-15deg);
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    font-size: 11px;
    color: #0a1f14;
    font-weight: 700;
  }

  .check-item.done .check-tick {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  .check-content { flex: 1; min-width: 0; }

  .check-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    transition: color 0.2s, opacity 0.2s;
  }

  .check-item.done .check-text {
    color: var(--text3);
    text-decoration: line-through;
    opacity: 0.6;
  }

  .check-ref {
    font-size: 11px;
    color: var(--gold);
    margin-top: 3px;
    opacity: 0.8;
  }

  .check-item.done .check-ref { opacity: 0.4; }

  /* ── TOAST ────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--bg3);
    border: 1px solid var(--line2);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 999;
    pointer-events: none;
    max-width: 280px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── MODAL (reset confirm) ────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--line2);
    border-radius: var(--radius-lg);
    padding: 32px;
    max-width: 360px;
    width: 90%;
  }

  .modal h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    margin-bottom: 10px;
  }

  .modal p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .modal-btns { display: flex; gap: 10px; }

  .modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius);
    border: 1px solid var(--line2);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    transition: all 0.15s;
  }

  .btn-cancel { background: none; color: var(--text2); }
  .btn-cancel:hover { background: var(--bg3); color: var(--text); }
  .btn-confirm { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-confirm:hover { opacity: 0.85; }

  /* ── COMPLETED BANNER ─────────────────────────────────────────────────── */
  .completed-banner {
    display: none;
    margin-bottom: 16px;
    padding: 14px 20px;
    background: var(--green-bg);
    border: 1px solid var(--green-d);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--green);
    align-items: center;
    gap: 10px;
  }

  .completed-banner.show { display: flex; }

  /* ── MISC ─────────────────────────────────────────────────────────────── */
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  @media (max-width: 768px) {
    .sidebar { width: 220px; }
    .main { padding: 24px 20px; }
    .subject-name { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Operation Self</div>
      <div class="sidebar-title">Mathematik<br>Lernsystem</div>
      <div class="sidebar-sub">Abitur 2026 · Hamburg</div>
    </div>

    <div class="sidebar-progress">
      <div class="prog-label">
        <span>Gesamtfortschritt</span>
        <span id="total-pct">0%</span>
      </div>
      <div class="prog-bar-wrap">
        <div class="prog-bar-fill" id="total-bar" style="width:0%"></div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px;" id="total-count">0 / 0 Themen</div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- generated by JS -->
    </nav>

    <div class="sidebar-footer">
      <button class="reset-btn" onclick="confirmReset()">⚠ Fortschritt zurücksetzen</button>
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────────────────────────────── -->
  <main class="main" id="main-content">
    <!-- generated by JS -->
  </main>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Reset Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Fortschritt zurücksetzen?</h3>
    <p>Alle Häkchen werden gelöscht. Das kann nicht rückgängig gemacht werden.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-confirm" onclick="doReset()">Zurücksetzen</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════════════════════

const SUBJECTS = [
  {
    id: "analysis1",
    num: "Fach 01",
    title: "Analysis I",
    subtitle: "Ganzrationale Funktionen · Ableitungen · Extremwertprobleme",
    color: "#4f8ef7",
    bgColor: "#0d1f3c",
    bookRef: "Arbeitsbuch Analysis I (Klett)",
    formelRef: "Tafelwerk S. 63–65 · Sicher im Abi S. 56–93",
    sections: [
      {
        id: "a1-s0",
        title: "1.0 · Grundlagen — Voraussetzungen",
        items: [
          { text: "Terme vereinfachen & zusammenfassen", ref: "Analysis I, S. 4" },
          { text: "Ausklammern — Rechnen mit Klammern", ref: "Analysis I, S. 4" },
          { text: "Ausmultiplizieren — Rechnen mit Klammern", ref: "Analysis I, S. 5" },
          { text: "Binomische Formeln anwenden: (a±b)² und (a+b)(a-b)", ref: "Analysis I, S. 6" },
          { text: "Potenzregel verstehen und anwenden", ref: "Analysis I, S. 7" },
          { text: "Potenzen mit negativen Hochzahlen: x⁻ⁿ = 1/xⁿ", ref: "Analysis I, S. 8" },
          { text: "Potenzen mit gebrochenen Hochzahlen: x^(1/n) = ⁿ√x", ref: "Analysis I, S. 8" },
          { text: "Gleichungen durch Äquivalenzumformungen lösen", ref: "Analysis I, S. 9" },
          { text: "Quadratische Gleichungen — pq-Formel: x = -p/2 ± √((p/2)²-q)", ref: "Analysis I, S. 9" },
          { text: "Quadratische Gleichungen — abc-Formel (Mitternachtsformel)", ref: "Analysis I, S. 10" },
          { text: "Einfache Bruchgleichungen lösen", ref: "Analysis I, S. 11" },
          { text: "Schnittpunkte von Funktionen f(x)=g(x) bestimmen", ref: "Analysis I, S. 12" },
          { text: "Gleichungen mit Parametern lösen", ref: "Analysis I, S. 12" },
          { text: "LGS mit dem Additionsverfahren lösen", ref: "Analysis I, S. 13" },
          { text: "Lineare Funktionen zeichnen und aus Graphen bestimmen", ref: "Analysis I, S. 14–16" },
          { text: "Graphen der Grundfunktionen zeichnen und untersuchen (x², x³, √x, 1/x)", ref: "Analysis I, S. 16" },
        ]
      },
      {
        id: "a1-s1",
        title: "1.1 · Funktionen & ihre Graphen",
        items: [
          { text: "Zusammenhang zwischen Funktionsterm und Graph darstellen und erklären", ref: "S. 18 · Sicher S. 6–11" },
          { text: "Verschiebung in y-Richtung: f(x) + t verschiebt den Graphen um t nach oben/unten", ref: "S. 21 · Sicher S. 20" },
          { text: "Verschiebung in x-Richtung: f(x − s) verschiebt den Graphen um s nach rechts", ref: "S. 21 · Sicher S. 20" },
          { text: "Streckung in y-Richtung: a·f(x) streckt mit Faktor a in y-Richtung", ref: "S. 24" },
          { text: "Streckung in x-Richtung: f(b·x) streckt mit Faktor 1/b in x-Richtung", ref: "S. 24" },
          { text: "Spiegelung an der x-Achse: −f(x)", ref: "S. 26" },
          { text: "Spiegelung an der y-Achse: f(−x)", ref: "S. 26" },
          { text: "Verhalten für x → +∞ und x → −∞ untersuchen (Leitterm)", ref: "S. 29 · Tafelwerk S. 62" },
          { text: "Achsensymmetrie nachweisen: f(−x) = f(x) für alle x", ref: "S. 31" },
          { text: "Punktsymmetrie nachweisen: f(−x) = −f(x) für alle x", ref: "S. 31" },
          { text: "Nullstellen ganzrationaler Funktionen durch Ausklammern, pq-Formel, Linearfaktoren", ref: "S. 33" },
          { text: "Ganzrationale Funktionen mit Linearfaktoren darstellen: f(x) = a(x−x₁)(x−x₂)…", ref: "S. 36 · Sicher S. 15" },
        ]
      },
      {
        id: "a1-s2",
        title: "1.2 · Ableitungsregeln",
        items: [
          { text: "Potenzregel: f(x) = xⁿ  →  f'(x) = n·xⁿ⁻¹", ref: "S. 39 · Tafelwerk S. 63" },
          { text: "Faktorregel: [c·f(x)]' = c·f'(x)", ref: "S. 41 · Sicher S. 60" },
          { text: "Summenregel: [f(x) + g(x)]' = f'(x) + g'(x)", ref: "S. 41 · Sicher S. 60" },
          { text: "Monotonie untersuchen: f'(x) > 0 → steigend, f'(x) < 0 → fallend", ref: "S. 43 · Sicher S. 70" },
          { text: "Notwendige Bedingung für Extremstellen: f'(x₀) = 0", ref: "S. 45 · Sicher S. 75" },
          { text: "Hinreichende Bedingung (VZW-Kriterium): Vorzeichenwechsel von f' prüfen", ref: "S. 45 · Sicher S. 75" },
          { text: "Hinreichende Bedingung (2. Ableitung): f'(x₀)=0 und f''(x₀)≠0", ref: "S. 45 · Sicher S. 75" },
          { text: "Krümmungsverhalten: f''(x) > 0 → Linkskrümmung (Schüssel), f''(x) < 0 → Rechtskrümmung", ref: "S. 47 · Sicher S. 73" },
          { text: "Notwendige Bedingung für Wendestellen: f''(x₀) = 0", ref: "S. 49 · Sicher S. 79" },

// STORAGE

const STORAGE_KEY = "mathe_abitur_2026";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch {}
}

let state = loadState();

function isChecked(itemId) { return !!state[itemId]; }

function toggleItem(itemId) {
  state[itemId] = !state[itemId];
  if (!state[itemId]) delete state[itemId];
  saveState(state);
}

// ════════════════════════════════════════════════════════════════════════════
// PROGRESS HELPERS
// ════════════════════════════════════════════════════════════════════════════

function getSubjectProgress(subject) {
  let total = 0, done = 0;
  subject.sections.forEach(sec => {
    sec.items.forEach((_, i) => {
      const id = `${sec.id}-${i}`;
      total++;
      if (isChecked(id)) done++;
    });
  });
  return { total, done, pct: total ? Math.round((done/total)*100) : 0 };
}

function getSectionProgress(section) {
  let total = 0, done = 0;
  section.items.forEach((_, i) => {
    const id = `${section.id}-${i}`;
    total++;
    if (isChecked(id)) done++;
  });
  return { total, done };
}

function getTotalProgress() {
  let total = 0, done = 0;
  SUBJECTS.forEach(s => {
    const p = getSubjectProgress(s);
    total += p.total;
    done += p.done;
  });
  return { total, done, pct: total ? Math.round((done/total)*100) : 0 };
}

// RENDER
// ════════════════════════════════════════════════════════════════════════════

const openSections = new Set();

function renderAll() {
  renderSidebar();
  renderMain();
  updateAllProgress();
}

function renderSidebar() {
  const nav = document.getElementById("sidebar-nav");
  nav.innerHTML = SUBJECTS.map(s => {
    const prog = getSubjectProgress(s);
    return `
    <div class="nav-subject" id="nav-${s.id}">
      <button class="nav-subject-btn" onclick="scrollToSubject('${s.id}')">
        <span class="nav-dot" style="background:${s.color}"></span>
        <span class="nav-subject-name">${s.title}</span>
        <span class="nav-pct" id="nav-pct-${s.id}">${prog.pct}%</span>
      </button>
      <div class="nav-mini-bar">
        <div class="nav-mini-fill" id="nav-bar-${s.id}" style="background:${s.color};width:${prog.pct}%"></div>
      </div>
      <div class="nav-sections">
        ${s.sections.map(sec => `
          <span class="nav-sec-link" onclick="scrollToSection('${sec.id}')">${sec.title}</span>
        `).join("")}
      </div>
    </div>`;
  }).join("");
}

function renderMain() {
  const main = document.getElementById("main-content");
  main.innerHTML = SUBJECTS.map(s => renderSubject(s)).join("");
}

function renderSubject(s) {
  const prog = getSubjectProgress(s);
  return `
  <div class="subject-block" id="subject-${s.id}">
    <div class="subject-hero" style="background:${s.bgColor};border:1px solid ${s.color}33;">
      <div class="subject-num" style="color:${s.color}">${s.num}</div>
      <div class="subject-name" style="color:${s.color}">${s.title}</div>
      <div class="subject-subtitle">${s.subtitle}</div>
      <div class="subject-refs">
        <span class="ref-chip">📚 ${s.bookRef}</span>
        <span class="ref-chip" style="color:var(--gold)">📐 ${s.formelRef}</span>
      </div>
      <div class="subject-stats">
        <div class="subject-prog-bar">
          <div class="subject-prog-fill" id="spf-${s.id}" style="width:${prog.pct}%"></div>
        </div>
        <div class="subject-pct" id="spct-${s.id}">${prog.pct}%</div>
        <div class="subject-count" id="scnt-${s.id}">${prog.done}/${prog.total}</div>
      </div>
    </div>
    ${s.sections.map(sec => renderSection(sec, s.color)).join("")}
  </div>`;
}

function renderSection(sec, color) {
  const prog = getSectionProgress(sec);
  const isOpen = openSections.has(sec.id);
  return `
  <div class="section-block" id="sec-block-${sec.id}">
    <div class="section-header" onclick="toggleSection('${sec.id}')">
      <span class="section-toggle ${isOpen?'open':''}">▶</span>
      <span class="section-accent-bar" style="background:${color}"></span>
      <div class="section-title-wrap">
        <div class="section-title">${sec.title}</div>
        <div class="section-meta">${prog.done} von ${prog.total} abgehakt</div>
      </div>
      <div class="section-prog">
        <div class="sec-mini-bar">
          <div class="sec-mini-fill" id="smf-${sec.id}" style="background:${color};width:${prog.total?Math.round(prog.done/prog.total*100):0}%"></div>
        </div>
        <span class="sec-count" id="scnt2-${sec.id}">${prog.done}/${prog.total}</span>
      </div>
    </div>
    <div class="section-body ${isOpen?'open':''}" id="body-${sec.id}">
      ${sec.items.map((item, i) => renderItem(item, sec.id, i, color)).join("")}
    </div>
  </div>`;
}

function renderItem(item, secId, idx, color) {
  const id = `${secId}-${idx}`;
  const done = isChecked(id);
  return `
  <div class="check-item ${done?'done':''}" id="ci-${id}" onclick="handleCheck('${id}','${secId}')">
    <div class="check-box" style="${done?`border-color:${color};background:${color}`:''} ">
      <span class="check-tick">✓</span>
    </div>
    <div class="check-content">
      <div class="check-text">${item.text}</div>
      <div class="check-ref">📄 ${item.ref}</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════════════════════

function handleCheck(itemId, secId) {
  toggleItem(itemId);
  const done = isChecked(itemId);

  // update item UI
  const ci = document.getElementById(`ci-${itemId}`);
  if (!ci) return;
  ci.classList.toggle("done", done);

  // find the subject colour
  const secParts = secId.split("-");
  const subjectId = secParts.slice(0,-1).join("-").replace(/-s\d+$/, '');
  const subject = SUBJECTS.find(s => s.sections.some(sec => sec.id === secId));
  const color = subject ? subject.color : "var(--green)";

  const box = ci.querySelector(".check-box");
  if (done) {
    box.style.borderColor = color;
    box.style.background = color;
  } else {
    box.style.borderColor = "";
    box.style.background = "";
  }

  updateSectionProgress(secId);
  if (subject) updateSubjectProgress(subject);
  updateTotalProgress();
}

function updateSectionProgress(secId) {
  const section = SUBJECTS.flatMap(s=>s.sections).find(s=>s.id===secId);
  if (!section) return;
  const prog = getSectionProgress(section);
  const el = document.getElementById(`smf-${secId}`);
  const cnt = document.getElementById(`scnt2-${secId}`);
  const hdr = document.getElementById(`sec-block-${secId}`)?.querySelector(".section-meta");
  if (el) el.style.width = `${section.items.length ? Math.round(prog.done/prog.total*100):0}%`;
  if (cnt) cnt.textContent = `${prog.done}/${prog.total}`;
  if (hdr) hdr.textContent = `${prog.done} von ${prog.total} abgehakt`;
}

function updateSubjectProgress(subject) {
  const prog = getSubjectProgress(subject);
  const fill = document.getElementById(`spf-${subject.id}`);
  const pct  = document.getElementById(`spct-${subject.id}`);
  const cnt  = document.getElementById(`scnt-${subject.id}`);
  const npct = document.getElementById(`nav-pct-${subject.id}`);
  const nbar = document.getElementById(`nav-bar-${subject.id}`);
  if (fill) fill.style.width = `${prog.pct}%`;
  if (pct)  pct.textContent  = `${prog.pct}%`;
  if (cnt)  cnt.textContent  = `${prog.done}/${prog.total}`;
  if (npct) npct.textContent = `${prog.pct}%`;
  if (nbar) nbar.style.width = `${prog.pct}%`;
}

function updateTotalProgress() {
  const prog = getTotalProgress();
  const bar  = document.getElementById("total-bar");
  const pct  = document.getElementById("total-pct");
  const cnt  = document.getElementById("total-count");
  if (bar) bar.style.width = `${prog.pct}%`;
  if (pct) pct.textContent = `${prog.pct}%`;
  if (cnt) cnt.textContent = `${prog.done} / ${prog.total} Themen`;
}

function updateAllProgress() {
  updateTotalProgress();
  SUBJECTS.forEach(s => {
    updateSubjectProgress(s);
    s.sections.forEach(sec => updateSectionProgress(sec.id));
  });
}

function toggleSection(secId) {
  const body = document.getElementById(`body-${secId}`);
  const toggle = document.querySelector(`#sec-block-${secId} .section-toggle`);
  if (!body) return;
  const isNowOpen = !openSections.has(secId);
  if (isNowOpen) {
    openSections.add(secId);
    body.classList.add("open");
    toggle && toggle.classList.add("open");
  } else {
    openSections.delete(secId);
    body.classList.remove("open");
    toggle && toggle.classList.remove("open");
  }
}

function scrollToSubject(subjectId) {
  const el = document.getElementById(`subject-${subjectId}`);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  // highlight active in sidebar
  document.querySelectorAll(".nav-subject").forEach(n => n.classList.remove("active"));
  document.querySelectorAll(".nav-subject-btn").forEach(b => b.classList.remove("active"));
  const navItem = document.getElementById(`nav-${subjectId}`);
  if (navItem) {
    navItem.classList.add("active");
    navItem.querySelector(".nav-subject-btn").classList.add("active");
  }
}

function scrollToSection(secId) {
  const el = document.getElementById(`sec-block-${secId}`);
  if (el) {
    if (!openSections.has(secId)) toggleSection(secId);
    setTimeout(() => el.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
  }
}

// ════════════════════════════════════════════════════════════════════════════
// RESET
// ════════════════════════════════════════════════════════════════════════════

function confirmReset() {
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

function doReset() {
  state = {};
  saveState(state);
  closeModal();
  // Re-render all check items without full page reload
  document.querySelectorAll(".check-item").forEach(ci => {
    ci.classList.remove("done");
    const box = ci.querySelector(".check-box");
    if (box) { box.style.borderColor=""; box.style.background=""; }
  });
  updateAllProgress();
  showToast("Fortschritt zurückgesetzt ✓");
}

// ════════════════════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════════════════════

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// Close modal on overlay click
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════

renderAll();
</script>
